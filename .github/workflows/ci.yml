name: dependency-only-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-compatibility:
    name: dependency compatibility (${{ matrix.lane }}, Python 3.14)
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        lane: [minimum-supported, current-compatible]
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/minimum_supported_py314.txt
      - name: Install minimum-supported dependency lane
        if: matrix.lane == 'minimum-supported'
        run: python -m pip install --constraint constraints/minimum_supported_py314.txt ".[dev]"
      - name: Install current-compatible dependency lane
        if: matrix.lane == 'current-compatible'
        run: python -m pip install --upgrade --upgrade-strategy eager ".[dev]"
      - name: Verify resolved dependencies
        run: python -m pip check
      - name: Compile Python sources
        run: python -m compileall -q comsol_mcp src development_kit
      - name: Run dependency and process regression suite
        run: python -m pytest -q

  unit-and-package-py314:
    name: unit-and-package (Python 3.14, default production lane)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependency-only test environment
        run: python -m pip install ".[dev]"
      - name: Verify pip check
        run: python -m pip check
      - name: Compile Python sources
        run: python -m compileall -q comsol_mcp src development_kit
      - name: Run dependency-only regression suite
        run: python -m pytest -q
      - name: Build wheel and source distribution
        run: python -m build
      - name: Probe a clean non-editable wheel install
        run: python development_kit/scripts/release_gate.py --skip-tests --allow-dirty --dependency-lock constraints/release_locked_py314.txt --artifact-root "$env:RUNNER_TEMP\comsol_release"

  integration-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
      - name: Validate sanitized real-COMSOL fixture contracts
        run: python -m pip install ".[dev]"
      - run: python -m pytest -q development_kit/tests/test_release_engineering.py

  locked-runtime-security:
    name: locked runtime vulnerability policy
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: constraints/release_locked_py314.txt
      - name: Install pinned audit tool
        run: python -m pip install "pip-audit==2.10.1"
      - name: Audit the exact locked runtime and apply review policy
        run: |
          python -m pip_audit --requirement constraints/release_locked_py314.txt --no-deps --format json --output pip-audit.json
          if (-not (Test-Path pip-audit.json)) { exit 1 }
          python development_kit/scripts/security_gate.py --report pip-audit.json --allowlist development_kit/release/vulnerability_allowlist.json --output security-receipt.json

# Real COMSOL tests are intentionally absent from hosted CI. Run the explicit,
# serial development_kit/scripts/run_real_release_gate.py gate on a licensed,
# version-pinned host.
