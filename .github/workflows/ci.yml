name: dependency-only-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-package-py314:
    name: unit-and-package (Python 3.14, default production lane)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependency-only test environment
        run: python -m pip install ".[dev]"
      - name: Verify pip check
        run: python -m pip check
      - name: Compile Python sources
        run: python -m compileall -q src development_kit
      - name: Run dependency-only regression suite
        run: python -m pytest -q
      - name: Build wheel and source distribution
        run: python -m build
      - name: Probe a clean non-editable wheel install
        run: python development_kit/scripts/release_gate.py --skip-tests --allow-dirty --dependency-lock constraints/release_locked_py314.txt --artifact-root "$env:RUNNER_TEMP\comsol_release"

  integration-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Validate sanitized real-COMSOL fixture contracts
        run: python -m pip install ".[dev]"
      - run: python -m pytest -q development_kit/tests/test_release_engineering.py

# Real COMSOL tests are intentionally absent from hosted CI. Run the explicit,
# serial development_kit/scripts/run_real_release_gate.py gate on a licensed,
# version-pinned host.
